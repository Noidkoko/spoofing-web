<!DOCTYPE html>
<!--
  Agency Spoofer — standalone HTML, deploy on GitHub Pages or Vercel.
  All processing runs in the browser: piexifjs (image EXIF) + ffmpeg.wasm v0.12 (single-threaded core@0.12.6 — no SharedArrayBuffer, works on file:// and GitHub Pages).
  No server required.

  DEPLOY:
    GitHub Pages : repo → Settings → Pages → Source: main / root
    Vercel       : import folder, framework "Other", publish dir "."

  CHANGE PASSWORD:
    Line ~390 — const PASSWORD = "spoofHUD2026";
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agency Spoofer</title>
  <style>
    :root {
      --bg:     #0c0c0f;
      --bg2:    #13131a;
      --bg3:    #1c1c26;
      --border: #252532;
      --pink:   #ff4fa3;
      --cyan:   #00d4ff;
      --green:  #3dff85;
      --yellow: #ffd060;
      --text:   #e4e4f0;
      --muted:  #6a6a88;
      --r: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 32px 20px;
    }

    /* ── Gate ─────────────────────────────────── */
    #gate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 28px;
      z-index: 200;
    }
    .gate-logo { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
    .gate-logo span { color: var(--pink); }
    .gate-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 36px; width: 340px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .gate-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .gate-box input {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-size: 15px; padding: 11px 14px; width: 100%;
      outline: none; transition: border-color .18s;
    }
    .gate-box input:focus { border-color: var(--cyan); }
    .gate-box input.err   { border-color: var(--pink); }
    .gate-error { font-size: 12px; color: var(--pink); min-height: 16px; text-align: center; }

    /* ── App ──────────────────────────────────── */
    #app { display: none; width: 100%; max-width: 840px; flex-direction: column; gap: 18px; }
    #app.on { display: flex; }

    .header { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .header-title span { color: var(--pink); }
    .header-sub { font-size: 12px; color: var(--muted); }

    /* ── Mode tabs ─────────────────────────────── */
    .tabs {
      display: flex; gap: 6px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 5px;
    }
    .tab {
      flex: 1; padding: 8px 12px;
      border: none; border-radius: 7px;
      background: transparent; color: var(--muted);
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all .15s;
    }
    .tab.on { background: var(--bg3); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.4); }

    .hint { font-size: 12px; color: var(--muted); padding: 0 4px; }

    /* ── Settings panel ────────────────────────── */
    .settings-panel {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .settings-head {
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      font-size: 12px; font-weight: 600; letter-spacing: .3px;
    }
    .settings-head .s-right { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11px; font-weight: 400; }
    .settings-body {
      display: none;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }
    .settings-body.closed { display: none; }
    .s-field { display: flex; flex-direction: column; gap: 6px; }
    .s-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }
    .s-field select, .s-field input[type="date"] {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-size: 12px; padding: 8px 10px; outline: none;
      transition: border-color .15s; cursor: pointer;
      appearance: none; -webkit-appearance: none;
    }
    .s-field select:focus, .s-field input[type="date"]:focus { border-color: var(--cyan); }
    .s-field select option { background: var(--bg3); }

    /* ── ffmpeg status ─────────────────────────── */
    .ff-status {
      display: none;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 16px;
      align-items: center; gap: 12px;
      font-size: 13px; color: var(--muted);
    }
    .ff-status.on { display: flex; }
    .ff-status.err { border-color: var(--pink); color: var(--pink); }

    /* ── Drop zone ─────────────────────────────── */
    .drop {
      border: 2px dashed var(--border); border-radius: 14px;
      padding: 44px 32px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .drop:hover, .drop.over { border-color: var(--cyan); background: rgba(0,212,255,.03); }
    .drop-icon { font-size: 34px; line-height: 1; }
    .drop-title { font-size: 15px; font-weight: 600; }
    .drop-sub { font-size: 12px; color: var(--muted); }
    #fileInput { display: none; }

    /* ── File list ─────────────────────────────── */
    .file-list { display: flex; flex-direction: column; gap: 7px; }
    .fi {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
      display: flex; align-items: center; gap: 11px;
    }
    .fi-icon {
      width: 34px; height: 34px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .fi-icon.img { background: rgba(255,79,163,.12); }
    .fi-icon.vid { background: rgba(0,212,255,.12); }
    .fi-info { flex: 1; min-width: 0; }
    .fi-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fi-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
    .b-wait { background: var(--bg3); color: var(--muted); }
    .b-proc { background: rgba(0,212,255,.13); color: var(--cyan); }
    .b-done { background: rgba(61,255,133,.13); color: var(--green); }
    .b-err  { background: rgba(255,79,163,.13); color: var(--pink); }

    /* ── Buttons ───────────────────────────────── */
    .btn {
      border: none; border-radius: var(--r); cursor: pointer;
      font-size: 13px; font-weight: 600; padding: 10px 18px;
      transition: all .14s;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      text-decoration: none;
    }
    .btn-pink  { background: var(--pink); color: #fff; }
    .btn-cyan  { background: var(--cyan); color: #000; }
    .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn:hover:not(:disabled) { filter: brightness(1.1); }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .actions { display: none; align-items: center; gap: 10px; }
    .actions .btn { flex: 1; }
    .btn-sq { flex: none !important; width: 40px; padding: 10px; }

    /* ── Progress ──────────────────────────────── */
    .prog { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: none; }
    .prog-fill { height: 100%; background: linear-gradient(90deg,var(--pink),var(--cyan)); width: 0; transition: width .3s; }

    /* ── Log ───────────────────────────────────── */
    .log-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .log-head {
      padding: 9px 14px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; font-size: 12px; color: var(--muted);
    }
    .log-body {
      display: none; padding: 10px 14px;
      font-family: 'Consolas','SF Mono',monospace;
      font-size: 11px; color: var(--muted);
      max-height: 180px; overflow-y: auto;
      line-height: 1.75; border-top: 1px solid var(--border);
    }
    .log-body.on { display: block; }
    .lok  { color: var(--green); }
    .lwarn{ color: var(--yellow); }
    .lerr { color: var(--pink); }

    /* ── Spinner ───────────────────────────────── */
    .spin {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      color: var(--cyan);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

  us:         [..._US_EAST_VID,..._US_WEST_VID,..._US_CENTRAL_VID],
  us_east:    _US_EAST_VID,
  us_west:    _US_WEST_VID,
  us_central: _US_CENTRAL_VID,
  france:     [..._FR_PARIS_VID,..._FR_OTHER_VID],
  paris:      _FR_PARIS_VID,

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
const ri  = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const rf  = (a,b) => Math.random()*(b-a)+a;
const rch = arr  => arr[Math.floor(Math.random()*arr.length)];

function pickGPS(group='us') {
  const zones = IMG_LOCATION_GROUPS[group] || IMG_LOCATION_GROUPS.us;
  const [la,lo] = rch(zones);
  const ar = ALT_RANGES[group] || ALT_RANGES.us_central;
  return [la+rf(-0.0015,0.0015), lo+rf(-0.0015,0.0015), rf(ar[0],ar[1])];
}

// backward compat
function parisGPS() { return pickGPS('paris'); }

function randomDT(baseDate=null, offsetSeconds=0) {
  let d;
  if (baseDate) {
    d = new Date(baseDate);
    d.setHours(ri(8,21), ri(0,59), ri(0,59), 0);
  } else {
    d = new Date();
    d.setDate(d.getDate()-ri(0,13));
    d.setHours(ri(8,21), ri(0,59), ri(0,59), 0);
  }
  return new Date(d.getTime()+offsetSeconds*1000);
}

function exifDate(d) {
  const p = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}:${p(d.getMonth()+1)}:${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function fmtBytes(b) {
  return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════
//  PNG STRIP
// ═══════════════════════════════════════════════════
const PNG_SIG  = [0x89,0x50,0x4e,0x47,0x0d,0x0a,0x1a,0x0a];
const PNG_KEEP = new Set(['IHDR','IDAT','IEND','PLTE','tRNS','acTL','fcTL','fdAT']);

function stripPNG(buf) {
  const view=new DataView(buf), b=new Uint8Array(buf), out=[new Uint8Array(PNG_SIG)], removed=[];
  let pos=8;
  while(pos+8<=buf.byteLength) {
    const len=view.getUint32(pos);
    const type=String.fromCharCode(b[pos+4],b[pos+5],b[pos+6],b[pos+7]);
    const tot=12+len;
    PNG_KEEP.has(type)?out.push(new Uint8Array(buf,pos,tot)):removed.push(type);
    pos+=tot;
  }
  return {bytes:merge(out),removed};
}

const STRIP_MK={0xe1:'APP1(EXIF/XMP)',0xeb:'APP11(C2PA)',0xed:'APP13(IPTC)'};
function stripJPEG(buf) {
  const view=new DataView(buf), b=new Uint8Array(buf), out=[new Uint8Array([0xff,0xd8])], removed=[];
  if(b[0]!==0xff||b[1]!==0xd8) return {bytes:buf,removed:[]};
  let pos=2;
  while(pos<buf.byteLength) {
    if(b[pos]!==0xff){out.push(new Uint8Array(buf,pos));break;}
    const mk=b[pos+1];
    if(mk===0xd8||mk===0xd9||(mk>=0xd0&&mk<=0xd7)){out.push(new Uint8Array(buf,pos,2));pos+=2;continue;}
    if(pos+4>buf.byteLength){out.push(new Uint8Array(buf,pos));break;}
    const slen=view.getUint16(pos+2),end=pos+2+slen;
    STRIP_MK[mk]?removed.push(STRIP_MK[mk]):out.push(new Uint8Array(buf,pos,end-pos));
    pos=end;
  }
  return {bytes:merge(out),removed};
}

function merge(arrs) {
  const total=arrs.reduce((s,a)=>s+a.byteLength,0),res=new Uint8Array(total);
  let off=0; for(const a of arrs){res.set(a,off);off+=a.byteLength;}
  return res.buffer;
}

// ═══════════════════════════════════════════════════
//  CANVAS NOISE — Box-Muller gaussian σ=1.5
// ═══════════════════════════════════════════════════
let _spare=null,_hasSpare=false;
function gauss(std=1.5) {
  if(_hasSpare){_hasSpare=false;return _spare*std;}
  let u,v,s;
  do{u=Math.random()*2-1;v=Math.random()*2-1;s=u*u+v*v;}while(s>=1||s===0);
  const f=Math.sqrt(-2*Math.log(s)/s);
  _spare=v*f;_hasSpare=true;return u*f*std;
}
const clamp=n=>Math.max(0,Math.min(255,Math.round(n)));

function mkCanvas(w,h){const el=document.createElement('canvas');el.width=w;el.height=h;return{el,ctx:el.getContext('2d')};}

async function addNoise(blob, fmt) {
  return new Promise((ok,err)=>{
    const img=new Image();
    img.onload=()=>{
      const W=img.naturalWidth,H=img.naturalHeight;
      const c=mkCanvas(W,H); c.ctx.drawImage(img,0,0);
      const id=c.ctx.getImageData(0,0,W,H),d=id.data;
      for(let i=0;i<d.length;i+=4){const n=Math.round(gauss());d[i]=clamp(d[i]+n);d[i+1]=clamp(d[i+1]+n);d[i+2]=clamp(d[i+2]+n);}
      c.ctx.putImageData(id,0,0);
      const c2=mkCanvas(W+1,H);c2.ctx.drawImage(c.el,0,0,W+1,H);
      const c3=mkCanvas(W,H);c3.ctx.drawImage(c2.el,0,0,W,H);
      const mime=fmt==='PNG'?'image/png':'image/jpeg';
      const q=fmt==='JPEG'?rf(0.92,0.96):undefined;
      c3.el.toBlob(ok,mime,q);
    };
    img.onerror=err;
    img.src=URL.createObjectURL(blob);
  });
}

// ═══════════════════════════════════════════════════
//  EXIF INJECTION via piexifjs
// ═══════════════════════════════════════════════════
function injectEXIF(jpegDataUrl, dev, dt, lat, lon, alt, w, h) {
  const R=(v,den=1000000)=>[Math.round(v*den),den];
  function dms(deg){
    const d=Math.floor(Math.abs(deg)),m=Math.floor((Math.abs(deg)-d)*60);
    const s=(Math.abs(deg)-d-m/60)*3600;
    return[[d,1],[m,1],[Math.round(s*1000),1000]];
  }
  const dtS=exifDate(dt),fn=dev.fnumber,fl=dev.focal_mm,fl35=dev.focal_35mm;
  const iso=ri(...dev.iso_range),expD=rch([60,100,125,200,250,500]);

  const z={};
  z[piexif.ImageIFD.Make]=dev.make; z[piexif.ImageIFD.Model]=dev.model;
  z[piexif.ImageIFD.Orientation]=1; z[piexif.ImageIFD.XResolution]=[72,1];
  z[piexif.ImageIFD.YResolution]=[72,1]; z[piexif.ImageIFD.ResolutionUnit]=2;
  z[piexif.ImageIFD.Software]=dev.software; z[piexif.ImageIFD.DateTime]=dtS;

  const e={};
  e[piexif.ExifIFD.ExposureTime]=[1,expD]; e[piexif.ExifIFD.FNumber]=R(fn);
  e[piexif.ExifIFD.ExposureProgram]=2; e[piexif.ExifIFD.ISOSpeedRatings]=iso;
  e[piexif.ExifIFD.DateTimeOriginal]=dtS; e[piexif.ExifIFD.DateTimeDigitized]=dtS;
  e[piexif.ExifIFD.ShutterSpeedValue]=R(Math.log2(expD));
  e[piexif.ExifIFD.ApertureValue]=R(2*Math.log2(fn));
  e[piexif.ExifIFD.BrightnessValue]=R(rf(6.5,9.5));
  e[piexif.ExifIFD.ExposureBiasValue]=[0,1]; e[piexif.ExifIFD.MeteringMode]=5;
  e[piexif.ExifIFD.Flash]=16; e[piexif.ExifIFD.FocalLength]=R(fl);
  e[piexif.ExifIFD.ColorSpace]=1; e[piexif.ExifIFD.PixelXDimension]=w;
  e[piexif.ExifIFD.PixelYDimension]=h; e[piexif.ExifIFD.ExposureMode]=0;
  e[piexif.ExifIFD.WhiteBalance]=0; e[piexif.ExifIFD.FocalLengthIn35mmFilm]=fl35;
  e[piexif.ExifIFD.SceneCaptureType]=0;
  e[piexif.ExifIFD.LensMake]=dev.lens_make; e[piexif.ExifIFD.LensModel]=dev.lens_model;

  const g={};
  g[piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S'; g[piexif.GPSIFD.GPSLatitude]=dms(lat);
  g[piexif.GPSIFD.GPSLongitudeRef]=lon>=0?'E':'W'; g[piexif.GPSIFD.GPSLongitude]=dms(lon);
  g[piexif.GPSIFD.GPSAltitudeRef]=0; g[piexif.GPSIFD.GPSAltitude]=R(alt);
  g[piexif.GPSIFD.GPSTimeStamp]=[[dt.getHours(),1],[dt.getMinutes(),1],[dt.getSeconds(),1]];
  g[piexif.GPSIFD.GPSSpeedRef]='K'; g[piexif.GPSIFD.GPSSpeed]=[0,1];
  g[piexif.GPSIFD.GPSImgDirectionRef]='T'; g[piexif.GPSIFD.GPSImgDirection]=R(rf(0,359.9),100);
  g[piexif.GPSIFD.GPSDateStamp]=dtS.split(' ')[0];

  return piexif.insert(piexif.dump({'0th':z,'Exif':e,'GPS':g,'1st':{},'thumbnail':null}), jpegDataUrl);
}

// ═══════════════════════════════════════════════════
//  IMAGE SPOOFER
// ═══════════════════════════════════════════════════
async function spoofImage(file, dev=null, dt=null, gps=null) {
  const cfg=getCfg();
  dev = dev || (cfg.device ? cfg.device : rch(IMG_DEVICE_LIST));
  dt  = dt  || randomDT(cfg.dateStr ? new Date(cfg.dateStr) : null);
  gps = gps || pickGPS(cfg.gpsGroup);
  const [lat,lon,alt]=gps;

  const buf=await file.arrayBuffer(), bytes=new Uint8Array(buf);
  let stripped,fmt,removed;

  if(bytes[0]===0x89&&bytes[1]===0x50&&bytes[2]===0x4e&&bytes[3]===0x47) {
    const r=stripPNG(buf);stripped=r.bytes;removed=r.removed;fmt='PNG';
  } else if(bytes[0]===0xff&&bytes[1]===0xd8) {
    const r=stripJPEG(buf);stripped=r.bytes;removed=r.removed;fmt='JPEG';
  } else {
    throw new Error(`Unsupported format — expected PNG or JPEG`);
  }

  log(`  Strip: ${removed.length?removed.join(', '):'no metadata found'}`);
  const noisedBlob=await addNoise(new Blob([stripped],{type:fmt==='PNG'?'image/png':'image/jpeg'}),fmt);
  log(`  Noise: gaussian σ=1.5 applied`);

  const bmp=await createImageBitmap(noisedBlob);
  const w=bmp.width,h=bmp.height;bmp.close();

  if(fmt==='JPEG') {
    const dataUrl=await blobToDataURL(noisedBlob);
    const withExif=injectEXIF(dataUrl,dev,dt,lat,lon,alt,w,h);
    log(`  EXIF: ${dev.model} | Paris ${lat.toFixed(4)}°N ${lon.toFixed(4)}°E | ${exifDate(dt)}`, 'lok');
    return dataURLToBlob(withExif);
  } else {
    log(`  PNG: noise applied — EXIF skipped (piexifjs is JPEG only)`, 'lwarn');
    return noisedBlob;
  }
}

function blobToDataURL(blob) {
  return new Promise((ok,err)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=err;r.readAsDataURL(blob);});
}
function dataURLToBlob(url) {
  const [h,d]=url.split(','),mime=h.match(/:(.*?);/)[1],raw=atob(d),arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// ═══════════════════════════════════════════════════
//  VIDEO SPOOFER — ffmpeg.wasm
// ═══════════════════════════════════════════════════
let _ff=null,_ffReady=false,_ffLoading=false,_ffError=null;

async function loadFF() {
  if(_ffReady) return _ff;

  // Already loading — wait with timeout (60s max)
  if(_ffLoading) {
    await new Promise((ok,fail)=>{
      let ticks=0;
      const t=setInterval(()=>{
        if(_ffReady){clearInterval(t);ok();}
        else if(_ffError){clearInterval(t);fail(new Error(_ffError));}
        else if(++ticks>600){clearInterval(t);fail(new Error('ffmpeg load timeout'));}
      },100);
    });
    return _ff;
  }

  _ffLoading=true; _ffError=null;
  const statusEl=document.getElementById('ffStatus');
  const msgEl=document.getElementById('ffMsg');
  statusEl.classList.remove('err'); statusEl.classList.add('on');
  msgEl.textContent='Loading ffmpeg.wasm (~30 MB)…';

  try {
    const {FFmpeg:FF}=FFmpegWASM;
    const {toBlobURL}=FFmpegUtil;
    _ff=new FF();
    const BASE='https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd';
    _ff.on('log',({message})=>{
      if(/frame=|fps=/.test(message)) log('  '+message.trim());
    });
    await _ff.load({
      coreURL: await toBlobURL(`${BASE}/ffmpeg-core.js`,'text/javascript'),
      wasmURL: await toBlobURL(`${BASE}/ffmpeg-core.wasm`,'application/wasm'),
    });
    _ffReady=true;
    statusEl.classList.remove('on');
    log('ffmpeg.wasm ready','lok');
  } catch(err) {
    _ffError=err.message;
    statusEl.classList.add('err');
    msgEl.textContent=`ffmpeg failed to load: ${err.message}`;
    log(`ffmpeg load error: ${err.message}`,'lerr');
    throw err;
  } finally {
    _ffLoading=false;
  }
  return _ff;
}

async function spoofVideo(file) {
  const ff=await loadFF();
  const {fetchFile}=FFmpegUtil;
  const cfg=getCfg();

  const dev=rch(VID_DEVICES);
  const vidLocs=VID_LOCATION_GROUPS[cfg.gpsGroup]||VID_LOCATION_GROUPS.us;
  const loc=rch(vidLocs);
  const dt=randomDT(cfg.dateStr?new Date(cfg.dateStr):null);
  const tz=rch(['+0100','+0200','+0000','-0500','-0700']);
  const p=n=>String(n).padStart(2,'0');
  const dtS=`${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())}T${p(dt.getHours())}:${p(dt.getMinutes())}:${p(dt.getSeconds())}${tz}`;

  const cx=ri(1,3),cy=ri(1,3);
  const vf=`crop=iw-${cx*2}:ih-${cy*2}:${cx}:${cy},eq=brightness=${rf(-0.008,0.008).toFixed(4)}:saturation=${rf(0.97,1.03).toFixed(3)}:contrast=${rf(0.99,1.01).toFixed(3)}`;
  const at=rf(0.997,1.003).toFixed(4),crf=ri(17,20);

  log(`  Device: ${dev.model}`);
  log(`  Location: ${loc.replace(/[+/]/g,' ').trim()}`);
  log(`  Date: ${dtS} | CRF: ${crf}`);

  await ff.writeFile('input.mp4',await fetchFile(file));

  await ff.exec([
    '-hide_banner','-loglevel','error',
    '-y','-i','input.mp4',
    '-vf',vf,'-map_metadata','-1',
    '-metadata',`make=${dev.make}`,'-metadata',`model=${dev.model}`,
    '-metadata',`encoder=${dev.encoder}`,'-metadata',`creation_time=${dtS}`,
    '-metadata',`com.apple.quicktime.make=${dev.make}`,
    '-metadata',`com.apple.quicktime.model=${dev.model}`,
    '-metadata',`com.apple.quicktime.software=${dev.software}`,
    '-metadata',`com.apple.quicktime.creationdate=${dtS}`,
    '-metadata','com.apple.quicktime.author=',
    '-metadata','com.apple.quicktime.copyright=',
    '-metadata',`location=${loc}`,
    '-metadata',`com.apple.quicktime.location.ISO6709=${loc}`,
    '-metadata:s:v',`location=${loc}`,
    '-c:v','libx264','-profile:v','high','-level:v','4.0',
    '-crf',String(crf),'-preset','veryfast',
    '-pix_fmt','yuv420p','-g','60','-keyint_min','60','-bf','3',
    '-colorspace','bt709','-color_primaries','bt709','-color_trc','bt709',
    '-af',`atempo=${at}`,'-c:a','aac','-b:a','192k','-ar','44100','-ac','2',
    '-movflags','+faststart+use_metadata_tags',
    'output.mp4'
  ]);

  const data=await ff.readFile('output.mp4');
  try{await ff.deleteFile('input.mp4');}catch(_){}
  try{await ff.deleteFile('output.mp4');}catch(_){}
  log(`  Re-encode done`,'lok');
  return new Blob([data.buffer],{type:'video/mp4'});
}

// ═══════════════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════════════
let mode='image', items=[], running=false, _uid=0;

const HINTS={
  image:    'Each file gets a random device and GPS independently.',
  carousel: 'All images share the same device and GPS — simulates a real photo session.',
  video:    'Re-encodes MP4 via ffmpeg.wasm. Allow 1–3 min per file.',
};
const ACCEPT={image:'image/png,image/jpeg',carousel:'image/png,image/jpeg',video:'video/mp4,video/*'};
const DROP_HINTS={image:'PNG, JPEG — or click to browse',carousel:'PNG, JPEG — or click to browse',video:'MP4 — or click to browse'};

function setMode(m) {
  mode=m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  document.getElementById('hint').textContent=HINTS[m];
  document.getElementById('fileInput').accept=ACCEPT[m];
  document.getElementById('dropHint').textContent=DROP_HINTS[m];
  // Show/hide date field (less relevant for video since ffmpeg ignores it)
  document.getElementById('cfgDateField').style.display=m==='video'?'none':'flex';
  items=[]; render(); syncActions();
  if(m==='video'&&!_ffReady&&!_ffLoading) loadFF();
}

function render() {
  const list=document.getElementById('fileList');
  list.innerHTML='';
  for(const it of items) {
    const isVid=it.file.type.startsWith('video/');
    const BC={waiting:'b-wait',processing:'b-proc',done:'b-done',error:'b-err'};
    const BL={waiting:'Waiting',processing:'Processing…',done:'Done ✓',error:'Error'};
    const div=document.createElement('div');
    div.className='fi'; div.id=`fi-${it.id}`;
    div.innerHTML=`
      <div class="fi-icon ${isVid?'vid':'img'}">${isVid?'🎬':'📷'}</div>
      <div class="fi-info">
        <div class="fi-name">${esc(it.file.name)}</div>
        <div class="fi-meta">${fmtBytes(it.file.size)}</div>
      </div>
      <span class="badge ${BC[it.status]}">${BL[it.status]}</span>
      ${it.blob?`<a class="btn btn-ghost" href="${URL.createObjectURL(it.blob)}" download="${spoofName(it.file.name)}" style="padding:8px 14px;font-size:12px;text-decoration:none;">↓ Save</a>`:''}
    `;
    list.appendChild(div);
  }
}

function syncActions() {
  document.getElementById('actions').style.display=items.length?'flex':'none';
  const allDone=items.length>0&&items.every(i=>i.status==='done');
  document.getElementById('dlAllBtn').style.display=(allDone&&items.length>1)?'inline-flex':'none';
}

function setItemStatus(id,status,blob=null) {
  const it=items.find(i=>i.id===id); if(!it)return;
  it.status=status; if(blob)it.blob=blob; render(); syncActions();
}

function spoofName(n) { const d=n.lastIndexOf('.');return d===-1?n+'_spoofed':n.slice(0,d)+'_spoofed'+n.slice(d); }

function addFiles(files) {
  for(const f of files) {
    const isImg=f.type.startsWith('image/'),isVid=f.type.startsWith('video/');
    if(mode==='video'&&!isVid){log(`Skipped (not a video): ${f.name}`,'lwarn');continue;}
    if(mode!=='video'&&!isImg){log(`Skipped (not an image): ${f.name}`,'lwarn');continue;}
    items.push({file:f,id:_uid++,status:'waiting',blob:null});
  }
  render(); syncActions();
}

// ═══════════════════════════════════════════════════
//  PROCESS
// ═══════════════════════════════════════════════════
async function processAll() {
  if(running||!items.length)return;
  running=true;
  const btn=document.getElementById('processBtn');
  btn.disabled=true; btn.textContent='Processing…';
  document.getElementById('prog').style.display='block';

  let sharedDev=null,sharedGPS=null;
  if(mode==='carousel') {
    const cfg=getCfg();
    sharedDev=cfg.device||rch(IMG_DEVICE_LIST);
    sharedGPS=pickGPS(cfg.gpsGroup);
    log(`Carousel — ${sharedDev.model} | ${sharedGPS[0].toFixed(4)}°N ${sharedGPS[1].toFixed(4)}°E`);
  }

  for(let i=0;i<items.length;i++) {
    const it=items[i];
    setItemStatus(it.id,'processing');
    document.getElementById('progFill').style.width=`${(i/items.length)*100}%`;
    log(`[${i+1}/${items.length}] ${it.file.name}`);
    try {
      let blob;
      if(mode==='video') {
        blob=await spoofVideo(it.file);
      } else if(mode==='carousel') {
        const cfg=getCfg();
        const dt=randomDT(cfg.dateStr?new Date(cfg.dateStr):null,ri(3,9)*(i+1));
        blob=await spoofImage(it.file,sharedDev,dt,sharedGPS);
      } else {
        blob=await spoofImage(it.file);
      }
      setItemStatus(it.id,'done',blob);
    } catch(err) {
      setItemStatus(it.id,'error');
      log(`  ✗ ${err.message}`,'lerr');
    }
  }

  document.getElementById('progFill').style.width='100%';
  setTimeout(()=>{document.getElementById('prog').style.display='none';document.getElementById('progFill').style.width='0';},900);
  running=false; btn.disabled=false; btn.textContent='Spoof'; syncActions();
}

// ═══════════════════════════════════════════════════
//  DOWNLOAD ALL — ZIP (JSZip loaded on demand)
// ═══════════════════════════════════════════════════
async function downloadAll() {
  if(!window.JSZip) {
    await new Promise(ok=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';s.onload=ok;document.head.appendChild(s);});
  }
  const zip=new JSZip();
  for(const it of items) if(it.blob) zip.file(spoofName(it.file.name),await it.blob.arrayBuffer());
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(await zip.generateAsync({type:'blob'})),download:'spoofed.zip'});
  a.click();
}

// ═══════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════
function tryLogin() {
  if(document.getElementById('pwInput').value===PASSWORD) {
    document.getElementById('gate').style.display='none';
    document.getElementById('app').classList.add('on');
  } else {
    document.getElementById('pwInput').classList.add('err');
    document.getElementById('gateErr').textContent='Incorrect password.';
  }
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{

  document.getElementById('loginBtn').addEventListener('click',tryLogin);
  document.getElementById('pwInput').addEventListener('keydown',e=>{
    if(e.key==='Enter')tryLogin();
    e.target.classList.remove('err');
    document.getElementById('gateErr').textContent='';
  });

  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));

  // Settings toggle
  document.getElementById('settingsHead').addEventListener('click',()=>{
    const body=document.getElementById('settingsBody');
    const chev=document.getElementById('settingsChev');
    body.classList.toggle('closed');
    chev.textContent=body.classList.contains('closed')?'▸':'▾';
  });
  ['cfgDevice','cfgGPS','cfgDate'].forEach(id=>{
    document.getElementById(id).addEventListener('change',updateSettingsSummary);
  });

  // Drop
  const drop=document.getElementById('drop'),fi=document.getElementById('fileInput');
  drop.addEventListener('click',()=>fi.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');addFiles(Array.from(e.dataTransfer.files));});
  fi.addEventListener('change',()=>{addFiles(Array.from(fi.files));fi.value='';});

  document.getElementById('processBtn').addEventListener('click',processAll);
  document.getElementById('dlAllBtn').addEventListener('click',downloadAll);
  document.getElementById('clearBtn').addEventListener('click',()=>{items=[];render();syncActions();});

  document.getElementById('logHead').addEventListener('click',()=>{
    const b=document.getElementById('logBody');
    b.classList.toggle('on');
    document.getElementById('logChev').textContent=b.classList.contains('on')?'▾':'▸';
  });

  setMode('image');
});
</script>
</body>
</html>
